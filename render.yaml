services:
  - type: web
    name: telegram-style-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_CHAT_ID
        sync: false
      - key: PERSONAL_CONTEXT
        sync: false
      - key: STYLE_PROMPT
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CHECKIN_SECRET
        sync: false
      - key: CHECKIN_PROBABILITY
        sync: false
      - key: CHECKIN_MIN_GAP_HOURS
        sync: false
      - key: TIMEZONE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
